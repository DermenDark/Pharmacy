services:
  db:
    image: postgres:16-alpine
    container_name: pharmacyapp-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pharmacy}
      POSTGRES_USER: ${POSTGRES_USER:-pharmacy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharmacy}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pharmacy} -d ${POSTGRES_DB:-pharmacy}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: ghcr.io/your-username/pharmacyapp-web:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharmacyapp-web
    command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - .env
    environment:
      DEBUG: "1"
      ALLOWED_HOSTS: localhost,127.0.0.1,0.0.0.0,web
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/image_for_project
      - static_data:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
  static_data:
