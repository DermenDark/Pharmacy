{% extends 'base.html' %}
{% block title %}{{ news.title }}{% endblock %}

{% block content %}
<div>
    <h1>{{ news.title }}</h1>

    {% if news.image %}
        <div>
            <img src="{{ news.image.url }}" alt="{{ news.title }}" style="max-width: 300px;">
        </div>
    {% endif %}

    <p>{{ news.content }}</p>
    <p><small>{{ news.created_at }}</small></p>
</div>
{% endblock %}
